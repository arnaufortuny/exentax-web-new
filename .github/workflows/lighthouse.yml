name: Lighthouse CI (PR)

# Triggered on every pull request that targets `main`. The job builds the
# production bundle, boots the SSR server on port 5000, and runs Lighthouse
# CI against four representative URLs (home ES/EN, blog index, calculator
# landing). Budgets and assertions live in `.lighthouserc.json` at the repo
# root.
#
# IMPORTANT — first-run bootstrap:
# This job is currently set to `continue-on-error: true` so the very first
# PR that ships this workflow can land without being blocked by an unknown
# baseline. Once we have ONE green run on `main`, a maintainer should
# remove the `continue-on-error: true` line below to make this job gating.
# Until then it is purely informational (artifact upload still works).
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    # See top-of-file comment: remove this line after the first green run
    # to make Core Web Vitals regressions block the PR.
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: exentax-web/package-lock.json

      - name: Install dependencies and build
        run: |
          cd exentax-web && npm ci && SKIP_BUILD_E2E=1 npm run build

      - name: Start production server
        env:
          NODE_ENV: production
          PORT: "5000"
        run: |
          # The build emits exentax-web/dist/index.mjs. We launch it in the
          # background so Lighthouse can probe http://localhost:5000.
          PORT=5000 NODE_ENV=production node exentax-web/dist/index.mjs &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          # Give the SSR server a moment to bind the socket before LHCI
          # starts hitting it. 5s is plenty on GitHub-hosted runners.
          sleep 5

      - name: Run Lighthouse CI
        run: |
          npx -p @lhci/cli@0.13.x lhci autorun --config=./.lighthouserc.json

      - name: Stop production server
        if: always()
        run: |
          if [ -n "${SERVER_PID:-}" ]; then
            kill "$SERVER_PID" || true
          fi

      - name: Upload Lighthouse HTML reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci/**/*.html
          if-no-files-found: warn
          retention-days: 14
