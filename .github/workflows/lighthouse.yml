name: Lighthouse CI (PR)

# Triggered on every pull request that targets `main`. The job builds the
# production bundle, boots the SSR server on port 5000, and runs Lighthouse
# CI against fifteen representative URLs (home ES/EN, blog index, calculator
# landing, las 5 subpáginas de servicios en /es y las 5 equivalentes en /en:
# llc-nuevo-mexico/llc-new-mexico, llc-wyoming, llc-delaware, llc-florida,
# obten-tu-itin/get-your-itin) with **two presets**: desktop
# (`.lighthouserc.json`) y mobile (`.lighthouserc.mobile.json`). Ambos
# resultados son bloqueantes.
#
# GATING — Task #15 (desktop, cerrado 2026-04-26, commit 945eae8) +
# Task #21 (mobile, 2026-04-26) + Task #22 (cobertura servicios /es,
# 2026-04-26) + Task #28 (cobertura servicios /en, 2026-04-27) +
# Task #45 (apretar umbral mobile perf 0.70 → 0.80, 2026-04-27):
# Este job es **bloqueante** en ambos presets. Si cualquier assertion
# `error` falla, el check sale en rojo y bloquea el merge a `main`.
#   • Desktop  (`.lighthouserc.json`):        LCP ≤ 2500 ms, CLS ≤ 0.1,
#                                             INP ≤ 200 ms, perf ≥ 0.85
#   • Mobile   (`.lighthouserc.mobile.json`): LCP ≤ 4000 ms, CLS ≤ 0.1,
#                                             INP ≤ 200 ms, perf ≥ 0.80
# Mediana de 3 runs por URL en cada preset.
#
# Estructura: un único job que ejecuta los dos presets en serie en pasos
# distintos (`lhci_desktop` y `lhci_mobile`) dentro del mismo runner.
# Esto permite que el step de aviso de bypass (Task #20) lea ambos
# `steps.lhci_*.outcome` y publique un único comentario en el PR sin
# necesidad de coordinar matrix shards. Si en el futuro el tiempo total
# del job se dispara por encima de los ~8 min razonables (Task #22
# duplicó la cobertura de URLs a 9 y Task #28 la subió a 15 sumando las
# 5 subpáginas de servicios en /en), reevaluar en este orden: (a) bajar
# `numberOfRuns` de 3 a 2 en ambos configs (la mediana sigue siendo
# defendible con 2 muestras y recorta ~33% del tiempo), o (b) partir en
# matrix por preset coordinando también el step de bypass-comment con
# `needs:` en un job agregador separado. Partir además por idioma
# (`{preset, lang}` → 4 shards) sólo si (a) y (b) no bastan, ya que el
# HTML SSR es estructuralmente equivalente entre /es y /en y duplicar
# shards por idioma es coste sin señal nueva en la mayoría de casos.
#
# Override de emergencia (refactor que pesa más pero es intencional, p.ej.
# añadir un widget de pago que sube LCP por una décima):
#   1) Mantener el gate activo: si la regresión es esperada y aceptada,
#      ajustar el `maxNumericValue` correspondiente en el config relevante
#      (`.lighthouserc.json` y/o `.lighthouserc.mobile.json`) en el mismo
#      PR y documentar el motivo en
#      `docs/auditoria-2026-04/RESUMEN.md` (sección "Lighthouse").
#   2) Bypass puntual sin tocar el config: añadir el label
#      `bypass-perf-gate` al PR. La presencia del label hace que los
#      steps `Run Lighthouse CI (desktop preset)` y
#      `Run Lighthouse CI (mobile preset)` no bloqueen el job
#      (`continue-on-error` condicional, aplicado a ambos presets) y el
#      workflow publica un comentario en el PR indicando quién aplicó
#      el label, dejando rastro auditable. No requiere admin ni
#      "Merge without waiting for requirements".
#      Caducidad (Task #24): el workflow programado
#      `bypass-perf-gate-sweeper.yml` retira el label automáticamente
#      si lleva más de 7 días aplicado y deja un comentario al autor
#      pidiendo reevaluar. Para extender el bypass, basta con volver a
#      aplicar el label (eso reinicia el contador).
# Nunca volver a poner `continue-on-error: true` incondicional aquí:
# usar siempre uno de los dos caminos anteriores para mantener el
# historial limpio.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  # `write` en pull-requests es necesario para que el step de aviso de
  # bypass pueda publicar un comentario en el PR cuando el label
  # `bypass-perf-gate` esté presente.
  pull-requests: write

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: exentax-web/package-lock.json

      - name: Install dependencies and build
        run: |
          cd exentax-web && npm ci && SKIP_BUILD_E2E=1 npm run build

      - name: Start production server
        env:
          NODE_ENV: production
          PORT: "5000"
        run: |
          # The build emits exentax-web/dist/index.mjs. We launch it in the
          # background so Lighthouse can probe http://localhost:5000.
          PORT=5000 NODE_ENV=production node exentax-web/dist/index.mjs &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          # Give the SSR server a moment to bind the socket before LHCI
          # starts hitting it. 5s is plenty on GitHub-hosted runners.
          sleep 5

      # `continue-on-error` se evalúa contra la presencia del label
      # `bypass-perf-gate` en el PR. Si el label está, el step puede
      # fallar (assertions rojas) sin tumbar el job — el reporte sigue
      # subiéndose como artifact y un step posterior comenta en el PR
      # quién aplicó el bypass. Si el label NO está, este step bloquea
      # el merge cuando alguna assertion `error` falla, manteniendo el
      # gate descrito en la cabecera del workflow (Task #15).
      - name: Run Lighthouse CI (desktop preset)
        id: lhci_desktop
        continue-on-error: ${{ contains(github.event.pull_request.labels.*.name, 'bypass-perf-gate') }}
        run: |
          npx -p @lhci/cli@0.13.x lhci autorun --config=./.lighthouserc.json

      - name: Run Lighthouse CI (mobile preset)
        # Runs even if the desktop step failed so the PR sees both sets of
        # assertion errors in a single CI run instead of having to fix one
        # preset, push, and discover the other regression on the next round.
        # `continue-on-error` también se evalúa contra el label
        # `bypass-perf-gate` (Task #20) para que el bypass cubra ambos
        # presets de forma simétrica.
        id: lhci_mobile
        if: always()
        continue-on-error: ${{ contains(github.event.pull_request.labels.*.name, 'bypass-perf-gate') }}
        run: |
          npx -p @lhci/cli@0.13.x lhci autorun --config=./.lighthouserc.mobile.json

      - name: Stop production server
        if: always()
        run: |
          if [ -n "${SERVER_PID:-}" ]; then
            kill "$SERVER_PID" || true
          fi

      - name: Upload Lighthouse HTML reports (desktop)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports-desktop
          path: .lighthouseci/**/*.html
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Lighthouse HTML reports (mobile)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports-mobile
          path: .lighthouseci-mobile/**/*.html
          if-no-files-found: warn
          retention-days: 14

      # ---------------------------------------------------------------
      # Aviso de bypass del gate de performance (Task #20)
      # ---------------------------------------------------------------
      # Cuando el label `bypass-perf-gate` está presente Y alguno de los
      # presets de Lighthouse falló (`steps.lhci_desktop.outcome` o
      # `steps.lhci_mobile.outcome` == 'failure'), publicamos un
      # comentario en el PR diciendo:
      #   - que el gate fue bypassado intencionalmente,
      #   - en qué presets (desktop, mobile o ambos),
      #   - quién aplicó el label (lo recuperamos del timeline del
      #     issue para que quede atribuido aunque el PR lo hayan
      #     etiquetado distintos usuarios),
      #   - y un puntero a los artifacts `lighthouse-reports-desktop` /
      #     `lighthouse-reports-mobile` para que el reviewer pueda
      #     revisar el reporte completo.
      # Usamos un marcador HTML para encontrar el comentario previo y
      # editarlo en sucesivos pushes en lugar de duplicarlo.
      #
      # En PRs originados desde un fork, `secrets.GITHUB_TOKEN` es de
      # solo lectura y la llamada devolverá 403; el comentario se
      # convierte en warning para no enmascarar el motivo real del
      # bypass.
      - name: Comment performance gate bypass on PR
        if: >
          always() &&
          github.event_name == 'pull_request' &&
          contains(github.event.pull_request.labels.*.name, 'bypass-perf-gate') &&
          (steps.lhci_desktop.outcome == 'failure' || steps.lhci_mobile.outcome == 'failure')
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const MARKER = '<!-- lighthouse-bypass-comment:task-20 -->';
            const desktopFailed = ${{ steps.lhci_desktop.outcome == 'failure' }};
            const mobileFailed = ${{ steps.lhci_mobile.outcome == 'failure' }};
            const presets = [];
            if (desktopFailed) presets.push('desktop');
            if (mobileFailed) presets.push('mobile');
            const presetLabel = presets.join(' + ') || 'unknown';
            let actor = 'desconocido';
            try {
              const events = await github.paginate(
                github.rest.issues.listEvents,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  per_page: 100,
                },
              );
              const labeled = [...events].reverse().find(
                (e) => e.event === 'labeled' && e.label && e.label.name === 'bypass-perf-gate',
              );
              if (labeled && labeled.actor && labeled.actor.login) {
                actor = labeled.actor.login;
              }
            } catch (err) {
              core.warning(`No se pudo determinar el autor del label: ${err.status || ''} ${err.message}`);
            }
            const lines = [
              MARKER,
              '### Performance gate (Lighthouse) bypassed',
              '',
              `El label \`bypass-perf-gate\` fue aplicado por **@${actor}**, por lo que las assertions rojas de Lighthouse no bloquearán este PR.`,
              '',
              `Preset(s) afectados: **${presetLabel}**.`,
              '',
              'Los reportes HTML completos siguen disponibles como artifacts `lighthouse-reports-desktop` y `lighthouse-reports-mobile` de este run para revisión manual. Asegúrate de documentar la razón del bypass en `docs/auditoria-2026-04/RESUMEN.md` (sección "Lighthouse").',
            ];
            const body = lines.join('\n');
            try {
              const existing = await github.paginate(
                github.rest.issues.listComments,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  per_page: 100,
                },
              );
              const prev = existing.find((c) => (c.body || '').includes(MARKER));
              if (prev) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: prev.id,
                  body,
                });
                core.info(`Lighthouse bypass comment actualizado (id=${prev.id}).`);
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body,
                });
                core.info('Lighthouse bypass comment creado.');
              }
            } catch (err) {
              core.warning(`No se pudo publicar el comentario de PR: ${err.status || ''} ${err.message}`);
            }
