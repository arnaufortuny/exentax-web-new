name: PT-PT guard

# Falla si el contenido en portugués (pt) del sitio vuelve a contener
# brasileñismos. Espejo del lint:brand-casing pero centrado en idioma.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  pt-pt-guard:
    name: Audit PT-PT (no brasileñismos)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    defaults:
      run:
        working-directory: exentax-web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run PT-PT audit
        run: node scripts/audit/audit-pt-pt.mjs
