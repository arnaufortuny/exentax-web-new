name: E2E (Playwright)

# PENDING.md §14 — required Playwright check.
#
# Runs the three blocking E2E specs (booking, calculator, language
# switch) across the seven browser surfaces our real users reach
# (chromium, firefox, webkit, mobile-chrome, mobile-safari,
# tablet-ipad, tablet-android) and uploads one HTML report per browser
# as artifacts (14-day retention) so failures can be triaged without
# re-running.
#
# Architecture: two job kinds, all required for a green check.
#
#   1. `playwright` — runs the specs against `npm run dev`. Every
#      `/api/*` request that the specs care about is stubbed via
#      `page.route`, so this job needs neither Postgres nor any
#      third-party credentials. The calculator render-email test hits
#      a dev-only endpoint (`/api/__test/render-calculator-email`)
#      that is gated on `NODE_ENV !== "production"`, which `npm run dev`
#      satisfies natively.
#
#      Matrix: each browser project from `playwright.config.ts` runs
#      as its own parallel job. `fail-fast: false` ensures all
#      browsers report — one Safari regression should not hide a
#      Firefox one. Each job uploads a per-browser report artifact.
#
#      Quarantine: when a browser proves chronically flaky, set
#      `quarantined: true` on its matrix entry so the job becomes
#      non-blocking (`continue-on-error`). The spec still runs and
#      uploads its report, so the regression is visible — it just
#      stops gating merges until the flake is fixed. Do NOT silently
#      delete the project from `playwright.config.ts`.
#
#   2. `prod-build-smoke` — runs `SKIP_BUILD_E2E=1 npm run build` to
#      verify the production server bundle compiles end-to-end with
#      the same toolchain (esbuild + Vite) used by the deploy. It
#      catches build-time regressions (missing imports, type errors,
#      blog-content lint) without needing the full prod runtime
#      (Postgres, Discord bot, Calendar service-account, etc.) which
#      `npm run check` (in quality-pipeline.yml) already exercises.
#
# Both job kinds run on every push and every PR to `main`. Mark all
# non-quarantined matrix legs and `prod-build-smoke` required in
# branch protection to prevent merging when the suite breaks.

on:
  push:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  playwright:
    name: Playwright E2E (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Quarantined matrix entries do not gate the merge. The spec
    # still runs and uploads its HTML report so the failure is
    # visible — it just stops blocking until the flake is fixed.
    continue-on-error: ${{ matrix.quarantined }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - project: chromium
            quarantined: false
          - project: firefox
            quarantined: false
          - project: webkit
            quarantined: false
          - project: mobile-chrome
            quarantined: false
          - project: mobile-safari
            quarantined: false
          # Tablet projects (task 39): catch intermediate-viewport
          # regressions (e.g. /agendar CTA stacking on iPad / Android
          # tablets) that the desktop + phone matrix misses. Start
          # `quarantined: false` per the task brief; flip to true if
          # they prove flaky rather than deleting them.
          - project: tablet-ipad
            quarantined: false
          - project: tablet-android
            quarantined: false

    defaults:
      run:
        working-directory: exentax-web

    env:
      # `playwright.config.ts` checks `process.env.CI` to decide whether
      # to spawn its own dev server (true on GH actions, false on the
      # Replit "Start application" workflow).
      CI: "true"
      NODE_ENV: development
      # The three E2E specs are fully self-contained: every `/api/*`
      # request is stubbed via `page.route`. They do NOT need Postgres,
      # Calendar, Gmail, OpenAI, etc., so we don't bring up any service.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: exentax-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Resolve pinned Playwright version
        # Read the exact version from `package-lock.json` so the cache
        # key tracks the lockfile, not whatever floating tag is in
        # `package.json`. When the lockfile bumps Playwright, the key
        # changes and we re-download — otherwise we hit the cache.
        id: playwright-version
        run: |
          version=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        # The browser binaries Playwright downloads live in
        # `~/.cache/ms-playwright` and are pinned per Playwright
        # version, so caching them keyed on that version is safe and
        # cuts each matrix leg's setup from minutes to seconds.
        # System libraries (libnss3, libgbm1, …) are NOT cached here
        # — they live under `/usr/lib` and are reinstalled cheaply by
        # `playwright install-deps` on cache hit.
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers (cache miss)
        # On cache miss we download the browser binaries AND install
        # the system libs in one shot. `--with-deps` pulls in the
        # system libraries each engine needs on ubuntu-latest
        # (libnss3, libgbm1, libgtk-3-0, …). The mobile + tablet
        # projects re-use the desktop engines:
        #   - mobile-chrome   (Pixel 7)        → chromium
        #   - mobile-safari   (iPhone 14)      → webkit
        #   - tablet-ipad     (iPad gen 11)    → webkit
        #   - tablet-android  (Galaxy Tab S4)  → chromium
        # so installing all three engines (chromium / firefox / webkit)
        # is enough to cover every project in `playwright.config.ts`.
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Install Playwright system deps (cache hit)
        # The browser binaries restored from cache still need their
        # apt-level system libraries (libnss3, libgbm1, libgtk-3-0, …)
        # provisioned on the runner, so re-run just the deps step.
        # This is seconds, vs. minutes for the full browser download.
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium firefox webkit

      - name: Run E2E suite (${{ matrix.project }})
        # Run only this matrix leg's project. The config spins up
        # `npm run dev` automatically when CI=1.
        run: npx playwright test --project=${{ matrix.project }}

      - name: Upload Playwright HTML report (${{ matrix.project }})
        # Always upload, even on success, so the report is available
        # for any failure triage. One artifact per browser per task
        # 29; 14d retention per task brief.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: exentax-web/playwright-report
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Playwright traces (${{ matrix.project }}, failures only)
        # `trace: "retain-on-failure"` (in playwright.config.ts) writes
        # a per-test `trace.zip` under `test-results/` whenever a test
        # fails. Uploading it lets reviewers replay the run with
        # `npx playwright show-trace`.
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ matrix.project }}
          path: exentax-web/test-results
          if-no-files-found: ignore
          retention-days: 14

  prod-build-smoke:
    name: Production bundle smoke build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: exentax-web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: exentax-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        # SKIP_BUILD_E2E=1 skips the in-build newsletter/booking guards
        # which require a real Postgres + Calendar + Gmail. Those are
        # already exercised by quality-pipeline.yml. Here we only need
        # to confirm the client bundle (Vite) and server bundle
        # (esbuild) both compile against the current source tree, so a
        # build-time regression (missing import, type error, Vite
        # config drift) breaks the E2E pipeline immediately.
        env:
          SKIP_BUILD_E2E: "1"
        run: npm run build

      - name: Verify build artefacts exist
        # Sanity check: the deploy expects both bundles to exist at
        # well-known paths. If esbuild silently emitted nothing, the
        # build "succeeded" but production would 404, so we explicitly
        # assert the artefacts are present and non-empty.
        run: |
          test -s dist/index.mjs || (echo "missing dist/index.mjs" && exit 1)
          test -s dist/index.cjs || (echo "missing dist/index.cjs" && exit 1)
          test -d dist/public/assets || (echo "missing dist/public/assets" && exit 1)
          ls -la dist/public/assets | head -10
