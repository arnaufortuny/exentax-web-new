name: E2E (Playwright)

# PENDING.md §14 — required Playwright check.
#
# Runs the three blocking E2E specs (booking, calculator, language
# switch) in headless chromium and uploads the HTML report as an
# artifact (14-day retention) so failures can be triaged without
# re-running.
#
# Architecture: two jobs, both required for a green check.
#
#   1. `playwright` — runs the specs against `npm run dev`. Every
#      `/api/*` request that the specs care about is stubbed via
#      `page.route`, so this job needs neither Postgres nor any
#      third-party credentials. The calculator render-email test hits
#      a dev-only endpoint (`/api/__test/render-calculator-email`)
#      that is gated on `NODE_ENV !== "production"`, which `npm run dev`
#      satisfies natively.
#
#   2. `prod-build-smoke` — runs `SKIP_BUILD_E2E=1 npm run build` to
#      verify the production server bundle compiles end-to-end with
#      the same toolchain (esbuild + Vite) used by the deploy. It
#      catches build-time regressions (missing imports, type errors,
#      blog-content lint) without needing the full prod runtime
#      (Postgres, Discord bot, Calendar service-account, etc.) which
#      `npm run check` (in quality-pipeline.yml) already exercises.
#
# Both jobs run on every push and every PR to `main`. Mark them
# required in branch protection to prevent merging when the suite
# breaks.

on:
  push:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  playwright:
    name: Playwright E2E (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: exentax-web

    env:
      # `playwright.config.ts` checks `process.env.CI` to decide whether
      # to spawn its own dev server (true on GH actions, false on the
      # Replit "Start application" workflow).
      CI: "true"
      NODE_ENV: development
      # The three E2E specs are fully self-contained: every `/api/*`
      # request is stubbed via `page.route`. They do NOT need Postgres,
      # Calendar, Gmail, OpenAI, etc., so we don't bring up any service.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: exentax-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright chromium browser
        # `--with-deps` pulls in the system libraries chromium needs on
        # ubuntu-latest (libnss3, libgbm1, etc.). We only need chromium
        # because `playwright.config.ts` defines a single project.
        run: npx playwright install --with-deps chromium

      - name: Run E2E suite
        # `npm run test:e2e` is `playwright test --project=chromium`.
        # The config spins up `npm run dev` automatically when CI=1.
        run: npm run test:e2e

      - name: Upload Playwright HTML report
        # Always upload, even on success, so the report is available for
        # any failure triage. Retention is 14d per task brief.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: exentax-web/playwright-report
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Playwright traces (failures only)
        # `trace: "retain-on-failure"` (in playwright.config.ts) writes
        # a per-test `trace.zip` under `test-results/` whenever a test
        # fails. Uploading it lets reviewers replay the run with
        # `npx playwright show-trace`.
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: exentax-web/test-results
          if-no-files-found: ignore
          retention-days: 14

  prod-build-smoke:
    name: Production bundle smoke build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: exentax-web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: exentax-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        # SKIP_BUILD_E2E=1 skips the in-build newsletter/booking guards
        # which require a real Postgres + Calendar + Gmail. Those are
        # already exercised by quality-pipeline.yml. Here we only need
        # to confirm the client bundle (Vite) and server bundle
        # (esbuild) both compile against the current source tree, so a
        # build-time regression (missing import, type error, Vite
        # config drift) breaks the E2E pipeline immediately.
        env:
          SKIP_BUILD_E2E: "1"
        run: npm run build

      - name: Verify build artefacts exist
        # Sanity check: the deploy expects both bundles to exist at
        # well-known paths. If esbuild silently emitted nothing, the
        # build "succeeded" but production would 404, so we explicitly
        # assert the artefacts are present and non-empty.
        run: |
          test -s dist/index.mjs || (echo "missing dist/index.mjs" && exit 1)
          test -s dist/index.cjs || (echo "missing dist/index.cjs" && exit 1)
          test -d dist/public/assets || (echo "missing dist/public/assets" && exit 1)
          ls -la dist/public/assets | head -10
